<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Critterpot - Match Drop Solver</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Status Bar (Top) -->
        <div id="statusBar" class="status-bar">
            <div class="status-content">
                <div id="statusIcon" class="status-icon"></div>
                <span id="statusText">Ready</span>
            </div>
        </div>

        <header>
            <h1>🐛 Critterpot</h1>
            <p>Find the optimal moves to clear the board</p>
        </header>

        <!-- Upload Section -->
        <div class="upload-section">
            <label for="screenshot">Upload Screenshot:</label>
            <input type="file" id="screenshot" accept="image/*">
            <button id="analyzeBtn">Analyze Board</button>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Board Editor Section -->
            <section class="board-section">
                <div class="board-header">
                    <h2>Board</h2>
                    <div class="board-actions">
                        <label for="elementSelect">Element:</label>
                        <select id="elementSelect">
                            <option value="">None (Empty)</option>
                        </select>
                        <button id="clearBoardBtn" class="secondary-btn">Clear All</button>
                        <button id="solveBtn">Solve</button>
                    </div>
                </div>
                <div class="board-display">
                    <canvas id="boardCanvas"></canvas>
                </div>
                <div class="board-info">
                    <p>Click tiles to place/remove elements</p>
                </div>
            </section>

            <!-- Solution Section -->
            <section class="solution-section hidden">
                <h2>Solution</h2>
                <div id="solutionStats">
                    <p>Moves needed: <span id="movesCount">-</span></p>
                </div>

                <div id="stepControls" class="hidden">
                    <button id="prevStep">← Previous</button>
                    <span id="stepIndicator">Step 0/0</span>
                    <button id="nextStep">Next →</button>
                </div>

                <div class="step-display">
                    <h3>Step <span id="currentStep">1</span></h3>
                    <canvas id="stepCanvas"></canvas>
                </div>

                <button id="downloadBtn" class="hidden">Download All Steps</button>
            </section>
        </div>
    </div>

    <script src="solver.js"></script>
    <script src="boardDetection.js"></script>
    <script src="boardEditor.js"></script>
    <script src="app.js"></script>
</body>
</html>
